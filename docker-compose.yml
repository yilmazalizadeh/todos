name: todoservice

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      todoservice:
        condition: service_started
    ports:
      - "${TODOSERVICE_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  todoservice:
    image: ${TODOSERVICE_IMAGE:-todoservice}:${TODOSERVICE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-root}
      VAULT_ENVIRONMENT: ${VAULT_ENVIRONMENT:-prod}
    expose:
      - "8080"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todoservice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todoservice_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todoservice} -d todoservice_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.19
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    command: server -dev
    expose:
      - "8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  vault-init:
    image: hashicorp/vault:1.19
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-root}
    command:
      - sh
      - -c
      - |
        vault kv put secret/todoservice/dev ConnectionStrings__TodoDb="Host=postgres;Port=5432;Database=todoservice_dev;Username=${POSTGRES_USER:-todoservice};Password=${POSTGRES_PASSWORD:-todoservice_password}"
        vault kv put secret/todoservice/staging ConnectionStrings__TodoDb="Host=postgres;Port=5432;Database=todoservice_staging;Username=${POSTGRES_USER:-todoservice};Password=${POSTGRES_PASSWORD:-todoservice_password}"
        vault kv put secret/todoservice/prod ConnectionStrings__TodoDb="Host=postgres;Port=5432;Database=todoservice_prod;Username=${POSTGRES_USER:-todoservice};Password=${POSTGRES_PASSWORD:-todoservice_password}"

volumes:
  postgres-data:
