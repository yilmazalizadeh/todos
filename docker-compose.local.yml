name: todoservice

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      todoservice:
        condition: service_started
    ports:
      - "${TODOSERVICE_LOCAL_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  todoservice:
    build:
      context: .
      dockerfile: Dockerfile.local
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-root}
      VAULT_ENVIRONMENT: ${VAULT_ENVIRONMENT:-dev}
    expose:
      - "8080"
    volumes:
      - .:/src
      - todoservice-nuget-cache:/root/.nuget/packages
    working_dir: /src
    command: dotnet watch --project Services/TodoService/TodoService.csproj run --no-launch-profile --urls http://0.0.0.0:8080

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todoservice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todoservice_password}
    ports:
      - "${POSTGRES_LOCAL_PORT:-5432}:5432"
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todoservice} -d todoservice_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.19
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    command: server -dev
    ports:
      - "${VAULT_LOCAL_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 20

  vault-init:
    image: hashicorp/vault:1.19
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-root}
    command:
      - sh
      - -c
      - |
        vault kv put secret/todoservice/dev ConnectionStrings__TodoDb="Host=postgres;Port=5432;Database=todoservice_dev;Username=${POSTGRES_USER:-todoservice};Password=${POSTGRES_PASSWORD:-todoservice_password}"
        vault kv put secret/todoservice/staging ConnectionStrings__TodoDb="Host=postgres;Port=5432;Database=todoservice_staging;Username=${POSTGRES_USER:-todoservice};Password=${POSTGRES_PASSWORD:-todoservice_password}"
        vault kv put secret/todoservice/prod ConnectionStrings__TodoDb="Host=postgres;Port=5432;Database=todoservice_prod;Username=${POSTGRES_USER:-todoservice};Password=${POSTGRES_PASSWORD:-todoservice_password}"

volumes:
  postgres-local-data:
  todoservice-nuget-cache:
