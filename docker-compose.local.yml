name: todoservice-local

# Local development infrastructure ONLY.
# The TodoService app is intentionally NOT included here — run it manually from
# the host (e.g. `dotnet run --project Services/TodoService/TodoService.csproj`
# or via Rider) so code changes are reflected immediately.
#
# The app's connection string is stored in Vault under secret/todoservice/dev.
# The app reads it directly via the built-in Vault configuration source
# (see Services/TodoService/Common/Configuration/Vault). Set VAULT_ADDR,
# VAULT_TOKEN and VAULT_ENVIRONMENT in your shell — or use a `.env.local` file
# loaded by scripts/load-dotenv.ps1 — to point at this dev Vault. The legacy
# scripts/load-secrets.ps1 helper is still available but no longer required.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todoservice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todoservice_password}
    ports:
      - "${POSTGRES_LOCAL_PORT:-5432}:5432"
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todoservice} -d todoservice_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.19
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    command: server -dev
    ports:
      - "${VAULT_LOCAL_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 20

  vault-init:
    image: hashicorp/vault:1.19
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-root}
      # Connection strings here target the HOST machine, because the app runs
      # on the host (not in a container) and connects to postgres via the
      # published port on localhost.
      POSTGRES_HOST_FOR_APP: ${POSTGRES_HOST_FOR_APP:-localhost}
      POSTGRES_PORT_FOR_APP: ${POSTGRES_LOCAL_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-todoservice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todoservice_password}
    command:
      - sh
      - -c
      - |
        vault kv put secret/todoservice/dev     ConnectionStrings__TodoDb="Host=$${POSTGRES_HOST_FOR_APP};Port=$${POSTGRES_PORT_FOR_APP};Database=todoservice_dev;Username=$${POSTGRES_USER};Password=$${POSTGRES_PASSWORD}"
        vault kv put secret/todoservice/staging ConnectionStrings__TodoDb="Host=$${POSTGRES_HOST_FOR_APP};Port=$${POSTGRES_PORT_FOR_APP};Database=todoservice_staging;Username=$${POSTGRES_USER};Password=$${POSTGRES_PASSWORD}"
        vault kv put secret/todoservice/prod    ConnectionStrings__TodoDb="Host=$${POSTGRES_HOST_FOR_APP};Port=$${POSTGRES_PORT_FOR_APP};Database=todoservice_prod;Username=$${POSTGRES_USER};Password=$${POSTGRES_PASSWORD}"

volumes:
  postgres-local-data:
